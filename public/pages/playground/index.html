<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try ADAN Online</title>

    <meta name="description"
        content="ADAN is a modern, memory safe programming language designed to be written like JavaScript and used like C for low-level programming.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#f54949">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://playground.adan.sh/">
    <meta property="og:title" content="ADAN">
    <meta property="og:description"
        content="A modern, memory safe programming language designed to be written like JavaScript and used like C for low-level programming.">
    <meta property="og:image" content="https://adan.sh/assets/logo.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ADAN">
    <meta name="twitter:description" content="Memory safe programming: Written like JS, used like C.">
    <meta name="twitter:image" content="https://adan.sh/assets/logo.png">

    <link rel="stylesheet" href="../../styles/elements.css">
    <link rel="stylesheet" href="../../styles/classes.css">
    <script src="../../scripts/global-loader.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <link rel="icon" type="image/png" href="../../assets/logo.png">
    <link rel="apple-touch-icon" href="../../assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="geist">
    <div class="unselect">
        <nav class="navbar install-navbar">
            <a class="logo-link" href="https://adan.sh"><img width="50" height="50" src="../../assets/logo.png"
                    alt="ADAN logo"></img></a>
            <a class="geist" href="https://install.adan.sh">Install</a>
            <a class="geist" href="https://docs.adan.sh">Documentation</a>
            <a class="geist" href="https://github.com/Cappucina/ADAN.git" target="_blank">Source</a>
        </nav>
    </div>

    <main class="pg-main">
        <div class="pg-pane">
            <div class="pg-pane-header">
                <span>main.adn</span>
                <button class="pg-run-btn" id="pg-run-btn" title="Run (Ctrl+Enter)">Run</button>
            </div>
            <div class="pg-editor-wrap">
                <pre class="pg-editor-pre"><code id="pg-highlight-code" class="language-adan"></code></pre>
                <textarea id="pg-textarea" class="pg-textarea" spellcheck="false" autocorrect="off" autocapitalize="off"
                    autocomplete="off" wrap="off" aria-label="ADAN source code editor"></textarea>
            </div>
        </div>

        <div class="pg-pane">
            <div class="pg-pane-header">
                <span>output</span>
                <span class="pg-exit-badge" id="pg-exit-badge"></span>
            </div>
            <pre class="pg-output"
                id="pg-output"><span class="pg-out-placeholder">Click Run (or Ctrl + Enter) to execute your code.</span></pre>
        </div>
    </main>

    <script src="../../scripts/playground.js"></script>
</body>

</html>
